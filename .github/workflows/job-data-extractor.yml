name: Job data extractor

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUNBUFFERED: "1"

on:
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate required input files
        run: |
          test -f jobs_input.csv || (echo "Missing jobs_input.csv" && exit 1)
          test -f predefined_locations.csv || (echo "Missing predefined_locations.csv" && exit 1)
          test -f predefined_salaries.csv || (echo "Missing predefined_salaries.csv" && exit 1)
          test -f predefined_tp_skills.csv || (echo "Missing predefined_tp_skills.csv" && exit 1)
          test -f predefined_nontp_skills.csv || (echo "Missing predefined_nontp_skills.csv" && exit 1)
          test -f predefined_job_titles.csv || (echo "Missing predefined_job_titles.csv" && exit 1)

      - name: Validate OpenAI API key
        run: |
          test -n "${OPENAI_API_KEY}" || (echo "Missing OPENAI_API_KEY secret" && exit 1)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Run extractor
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python main.py

      - name: Upload results artifact
        uses: actions/upload-artifact@v4
        with:
          name: job-data-results
          path: jobs_output.csv
          if-no-files-found: error
